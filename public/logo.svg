<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0A0A0A" stroke="url(#grad)" stroke-width="8"/>

  <!-- Stylized E -->
  <path d="M180 160 L340 160 L340 200 L220 200 L220 230 L320 230 L320 270 L220 270 L220 312 L340 312 L340 352 L180 352 Z" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Lightning Bolt / Energy Element -->
  <path d="M300 130 L340 130 L290 240 L330 240 L260 382 L270 270 L230 270 L270 160 Z" fill="#00A8FF" opacity="0.9" filter="url(#glow)"/>

  <!-- Accent Lines -->
  <line x1="140" y1="256" x2="170" y2="256" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="165" cy="256" r="8" fill="#FF6B00"/>
</svg>